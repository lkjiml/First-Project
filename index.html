<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="main">
        <textarea name="textarea" id="textarea" cols="21" rows="4">0</textarea>
        <br>
        <div class="conatiner">
            <div class="row">CE</div>
            <div class="row">C</div>
            <div class="row">X</div>
            <div class="row">/</div>
            <div class="row-number">7</div>
            <div class="row-number">8</div>
            <div class="row-number">9</div>
            <div class="row">x</div>
            <div class="row-number">4</div>
            <div class="row-number">5</div>
            <div class="row-number">6</div>
            <div class="row">-</div>
            <div class="row-number">1</div>
            <div class="row-number">2</div>
            <div class="row-number">3</div>
            <div class="row">+</div>
            <div class="row">+/-</div>
            <div class="row-number">0</div>
            <div class="row">.</div>
            <div class="row">=</div>

        </div>
    </div>
</body>

</html>
